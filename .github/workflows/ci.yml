name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Format and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test

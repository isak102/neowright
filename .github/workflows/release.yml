name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release asset
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/neowright" "dist/neowright"
          tar -C dist -czf "neowright-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" neowright

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: neowright-${{ github.ref_name }}-${{ matrix.target }}
          path: neowright-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit"

          {
            echo "## Changes"
            echo

            if [ -n "$previous_tag" ]; then
              range="$previous_tag..$GITHUB_REF_NAME"
              echo "Commits since [$previous_tag](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/$previous_tag):"
            else
              range="$GITHUB_REF_NAME"
              echo "Commits in this first release:"
            fi

            echo
            git log --reverse --pretty=format:"- [\`%h\`]($commit_url/%H) %s" "$range"
            echo
          } > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*.tar.gz
